<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos Omni 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <div class="header-logo">
            <img src="mini-logo.jpg" alt="Icono" class="logo-mini">
        </div>
        
        <div class="header-info">
            <span id="fecha-top"></span> | 
            <span id="geo-location">Cargando...</span>
        </div>

        <button class="hamburger-btn" onclick="toggleMenu()">☰ MENU</button>
    </header>

    <nav id="menu-drawer" class="drawer">
        <button class="close-btn" onclick="toggleMenu()">✕ CERRAR</button>
        <div class="drawer-content">
            <ul>
                <li><a href="#" onclick="mostrarSeccion('dashboard')">Dashboard</a></li>
                <li><a href="#" onclick="mostrarSeccion('seccion-tarot')">Tarot</a></li>
                </ul>
        </div>
    </nav>

    <main id="app-viewport">
        
        <section id="dashboard" class="vista">
            <div class="relojes">
                <p>Local: <span id="time-local"></span></p>
                <p>UTC: <span id="time-utc"></span></p>
                <p>Sideral: <span id="time-sideral"></span></p>
                <div id="render-zodiaco" class="grid-arquetipos"></div>
              
            </div>
            
            <canvas id="wheel-canvas"></canvas>
            
            <table id="render-dashboard-astros">
                </table>
            
            <table id="render-retrogradaciones">
                </table>
        </section>

        <section id="seccion-tarot" class="vista seccion-oculta">
            <h1>Oráculo</h1>
            <div id="render-tarot"></div>
        </section>

    </main>

    <footer class="main-footer">
        <img src="logo.jpg" alt="Logo" class="logo-footer">
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
